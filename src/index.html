<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Notepad App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Custom Title Bar -->
    <div class="titlebar" id="titlebar">
        <div class="titlebar-drag">
            <div class="titlebar-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10,9 9,9 8,9"/>
                </svg>
            </div>
            <span class="titlebar-title">Notepad App</span>
            <span class="titlebar-version" id="app-version"></span>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-btn" id="btn-minimize" title="Thu nhỏ">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" rx="0.75" fill="currentColor"/></svg>
            </button>
            <button class="titlebar-btn" id="btn-maximize" title="Phóng to">
                <svg width="12" height="12" viewBox="0 0 12 12" id="maximize-icon"><rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            </button>
            <button class="titlebar-btn titlebar-btn-close" id="btn-close" title="Đóng">
                <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <!-- Update Banner -->
    <div class="update-banner" id="update-banner">
        <div class="update-banner-content">
            <div class="update-info">
                <svg class="update-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7,10 12,15 17,10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span class="update-text" id="update-text">Đang kiểm tra cập nhật...</span>
            </div>
            <div class="update-actions">
                <div class="update-progress-wrapper" id="update-progress-wrapper">
                    <div class="update-progress-bar">
                        <div class="update-progress-fill" id="update-progress-fill"></div>
                    </div>
                    <span class="update-progress-text" id="update-progress-text">0%</span>
                </div>
                <button class="update-btn" id="update-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span id="update-btn-text">Cập nhật</span>
                </button>
                <button class="update-dismiss" id="update-dismiss" title="Đóng">
                    <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <button class="tool-btn" id="btn-new" title="Tạo mới (Ctrl+N)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
                <span>Mới</span>
            </button>
            <button class="tool-btn" id="btn-open" title="Mở file (Ctrl+O)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <span>Mở</span>
            </button>
            <div class="toolbar-divider"></div>
            <button class="tool-btn" id="btn-save" title="Lưu (Ctrl+S)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17,21 17,13 7,13 7,21"/>
                    <polyline points="7,3 7,8 15,8"/>
                </svg>
                <span>Lưu</span>
            </button>
            <button class="tool-btn" id="btn-save-as" title="Lưu thành... (Ctrl+Shift+S)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17,21 17,13 7,13 7,21"/>
                    <polyline points="7,3 7,8 15,8"/>
                </svg>
                <span>Lưu thành...</span>
            </button>
        </div>
        <div class="toolbar-file-info">
            <div class="file-indicator" id="file-indicator"></div>
            <span id="file-name" class="file-name">Chưa có file</span>
        </div>
    </div>

    <!-- Editor -->
    <div class="editor-wrapper">
        <div class="line-numbers" id="line-numbers">1</div>
        <textarea id="editor" placeholder="Nhập nội dung ghi chú tại đây..." spellcheck="false"></textarea>
    </div>

    <!-- Status Bar -->
    <div class="statusbar">
        <div class="statusbar-left">
            <span class="status-item" id="char-count">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
                Ký tự: 0
            </span>
            <span class="status-item" id="line-count">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg>
                Dòng: 1
            </span>
            <span class="status-item" id="word-count">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                Từ: 0
            </span>
        </div>
        <div class="statusbar-right">
            <span class="status-item status-encoding">UTF-8</span>
            <span class="status-item status-update-indicator" id="status-update" title="Kiểm tra cập nhật">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                <span id="status-update-text">Đã cập nhật</span>
            </span>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
